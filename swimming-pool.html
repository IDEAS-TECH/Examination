<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Swimming Pool - A-Frame</title>
  
  <!-- A-Frame Library -->
  <script src="scripts/aframe.js"></script>
  <script src="scripts/aframe-extras.min.js"></script>
  
  <!-- Swimming Pool Component -->
  <script src="swimmingpool.js"></script>

  <style>
    body { margin: 0; background: #fdfdfd; overflow: hidden; }
  </style>
</head>
<body>

  <a-scene renderer="antialias: true; colorManagement: true;">

    <!-- Professional Lighting -->
    <a-sky color="#d0efff"></a-sky>
    <a-light type="ambient" intensity="0.7" color="#ffffff"></a-light>
    <a-light type="directional" position="10 20 10" intensity="1.2" cast-shadow="true"></a-light>

    <!-- The Swimming Pool Entity -->
    <a-entity
        id="swimming-pool"
        position="0 0 -8"
        pool-basin="width: 10; depth: 16; height: 3">
    </a-entity>

    <!-- Professional Camera Angle -->
    <a-entity id="rig" position="0 6 10" rotation="-30 0 0">
      <a-camera look-controls wasd-controls="acceleration: 20"></a-camera>
    </a-entity>

  </a-scene>

</body>
</html>
